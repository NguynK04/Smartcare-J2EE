<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Lịch - SmartCare</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="/" class="brand">🏥 SmartCare</a>
            <ul class="nav-links">
                <li><a href="/doctor/dashboard">Dashboard</a></li>
                <li><a href="/doctor/schedules">Quản Lý Lịch</a></li>
                <li><a href="/doctor/patients">Bệnh Nhân</a></li>
            </ul>
            <div class="nav-right">
                
                <a href="/" class="btn btn-outline" onclick="logout()">Đăng Xuất</a>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <div class="hero">
        <h1>📅 Quản Lý Lịch Làm Việc</h1>
        <p>Thêm và quản lý các ca khám của bạn</p>
    </div>

    <!-- Main Content -->
    <div class="container" style="margin: 2rem auto;">
        <!-- Add Schedule Form -->
        <div class="card">
            <h3>➕ Thêm Lịch Khám Mới</h3>
            <form id="scheduleForm">
                <div class="grid" style="grid-template-columns: 1fr 1fr;">
                    <div class="form-group">
                        <label for="workDate">Ngày Khám</label>
                        <input type="date" id="workDate" required>
                    </div>
                    <div class="form-group">
                        <label for="startTime">Giờ Bắt Đầu</label>
                        <input type="time" id="startTime" required>
                    </div>
                    <div class="form-group">
                        <label for="endTime">Giờ Kết Thúc</label>
                        <input type="time" id="endTime" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Thêm Lịch</button>
            </form>
        </div>

        <!-- Schedules List -->
        <div class="card" style="margin-top: 2rem;">
            <h3>📋 Danh Sách Lịch Khám</h3>
            <div id="schedulesTable">
                <p style="text-align: center; color: #999;">Đang tải...</p>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 SmartCare. Tất cả quyền được bảo lưu.</p>
    </footer>

    <script>
        function checkAuth() {
            const token = localStorage.getItem('token');
            const role = localStorage.getItem('role');
            
            if (!token || role !== 'DOCTOR') {
                window.location.href = '/login';
            }
        }

        async function addSchedule(e) {
            e.preventDefault();
            
            const workDate = document.getElementById('workDate').value;
            const startTime = document.getElementById('startTime').value;
            const endTime = document.getElementById('endTime').value;
            const token = localStorage.getItem('token');

            try {
                const response = await fetch('/api/v1/schedules', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ workDate, startTime, endTime })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('Thêm lịch khám thành công!');
                    document.getElementById('scheduleForm').reset();
                    loadSchedules();
                } else {
                    alert(`Lỗi: ${data.message}`);
                }
            } catch (error) {
                alert(`Lỗi: ${error.message}`);
            }
        }

        async function loadSchedules() {
            const token = localStorage.getItem('token');
            const container = document.getElementById('schedulesTable');

            try {
                const response = await fetch('/api/v1/schedules/my', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                if (data.code === 200 && data.data.length > 0) {
                    let html = `<table>
                        <thead>
                            <tr>
                                <th>Ngày</th>
                                <th>Giờ Bắt Đầu</th>
                                <th>Giờ Kết Thúc</th>
                                <th>Trạng Thái</th>
                                <th>Hành Động</th>
                            </tr>
                        </thead>
                        <tbody>`;

                    data.data.forEach(schedule => {
                        const status = schedule.booked ? '<span class="badge" style="background: #999;">Đã Đặt</span>' : '<span class="badge" style="background: #00cc00;">Trống</span>';
                        
                        html += `<tr>
                            <td>${schedule.workDate}</td>
                            <td>${schedule.startTime}</td>
                            <td>${schedule.endTime}</td>
                            <td>${status}</td>
                            <td>
                                <button onclick="deleteSchedule(${schedule.id})" class="btn btn-danger" style="font-size: 0.8rem; padding: 0.4rem 0.8rem;">Xóa</button>
                            </td>
                        </tr>`;
                    });

                    html += `</tbody></table>`;
                    container.innerHTML = html;
                } else {
                    container.innerHTML = `<p style="text-align: center; color: #999;">Chưa có lịch khám nào</p>`;
                }
            } catch (error) {
                container.innerHTML = `<div class="alert alert-danger">Lỗi tải dữ liệu: ${error.message}</div>`;
            }
        }

        async function deleteSchedule(scheduleId) {
            if (!confirm('Bạn có chắc chắn muốn xóa lịch khám này?')) return;

            const token = localStorage.getItem('token');

            try {
                const response = await fetch(`/api/v1/schedules/${scheduleId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    alert('Xóa lịch khám thành công!');
                    loadSchedules();
                } else {
                    alert('Lỗi xóa lịch khám');
                }
            } catch (error) {
                alert(`Lỗi: ${error.message}`);
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('role');
            localStorage.removeItem('username');
            window.location.href = '/';
        }

        document.getElementById('scheduleForm').addEventListener('submit', addSchedule);
        checkAuth();
        loadSchedules();
    </script>
</body>
</html>
