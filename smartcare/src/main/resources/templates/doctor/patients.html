<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Bệnh Nhân - SmartCare</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="/" class="brand">🏥 SmartCare</a>
            <ul class="nav-links">
                <li><a href="/doctor/dashboard">Dashboard</a></li>
                <li><a href="/doctor/schedules">Quản Lý Lịch</a></li>
                <li><a href="/doctor/patients" class="active">Bệnh Nhân</a></li>
            </ul>
            <div class="nav-right">
                
                <a href="/" class="btn btn-outline" onclick="logout()">Đăng Xuất</a>
            </div>
        </div>
    </nav>

    <div class="hero">
        <h1>👥 Bệnh Nhân Của Tôi</h1>
        <p>Danh sách các bệnh nhân đã đặt lịch khám với bạn</p>
    </div>

    <div class="container" style="margin: 2rem auto;">
        <div class="card">
            <h3>📋 Lịch Sử & Danh Sách Bệnh Nhân</h3>
            <div id="patientsTable">
                <p style="text-align: center; color: #999;">Đang tải dữ liệu...</p>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 SmartCare. Tất cả quyền được bảo lưu.</p>
    </footer>

    <script>
        function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token || localStorage.getItem('role') !== 'DOCTOR') {
                window.location.href = '/login';
            }
        }

        async function loadPatients() {
            const token = localStorage.getItem('token');
            const container = document.getElementById('patientsTable');

            try {
                // Tận dụng lại API lấy danh sách lịch hẹn của Bác sĩ
                const response = await fetch('/api/v1/appointments/doctor/patients', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                if (data.code === 200 && data.data.length > 0) {
                    let html = `<table>
                        <thead>
                            <tr>
                                <th>Tên Bệnh Nhân</th>
                                <th>Ngày Khám</th>
                                <th>Giờ</th>
                                <th>Lý Do Khám</th>
                                <th>Trạng Thái</th>
                                <th>Hành Động</th>
                            </tr>
                        </thead>
                        <tbody>`;

                    data.data.forEach(appt => {
                        const statusBadge = `<span class="badge badge-${appt.status.toLowerCase()}">${appt.status}</span>`;
                        
                        // Xử lý nút Hành Động dựa trên trạng thái
                        let actions = '';
                        if (appt.status === 'CONFIRMED') {
                            actions = `<a href="/doctor/medical-record/${appt.appointmentId}" class="btn btn-primary" style="font-size: 0.8rem; padding: 0.4rem 0.8rem; text-decoration: none;">Ghi Chép</a>`;
                        } else if (appt.status === 'COMPLETED') {
                            actions = `<a href="/doctor/medical-record-view/${appt.appointmentId}" class="btn btn-secondary" style="font-size: 0.8rem; padding: 0.4rem 0.8rem; text-decoration: none;">Xem Bệnh Án</a>`;
                        } else if (appt.status === 'PENDING') {
                            actions = `<span style="font-size: 0.8rem; color: #999;">Vào Dashboard để Duyệt</span>`;
                        }

                        html += `<tr>
                            <td><strong>${appt.patientName}</strong></td>
                            <td>${appt.workDate}</td>
                            <td>${appt.startTime} - ${appt.endTime}</td>
                            <td>${appt.reason || 'Không có lý do'}</td>
                            <td>${statusBadge}</td>
                            <td>${actions}</td>
                        </tr>`;
                    });

                    html += `</tbody></table>`;
                    container.innerHTML = html;
                } else {
                    container.innerHTML = `<p style="text-align: center; color: #999;">Chưa có bệnh nhân nào đặt lịch</p>`;
                }
            } catch (error) {
                container.innerHTML = `<div class="alert alert-danger">Lỗi kết nối: ${error.message}</div>`;
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/';
        }

        checkAuth();
        loadPatients();
    </script>
</body>
</html>
