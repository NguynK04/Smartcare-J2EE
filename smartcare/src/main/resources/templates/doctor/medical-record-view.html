<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ Sơ Bệnh Án - SmartCare</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="/" class="brand">🏥 SmartCare</a>
            <ul class="nav-links">
                <li><a href="/doctor/dashboard">Dashboard</a></li>
                <li><a href="/doctor/schedules">Quản Lý Lịch</a></li>
                <li><a href="/doctor/patients">Bệnh Nhân</a></li>
            </ul>
            <div class="nav-right">
                
                <a href="/" class="btn btn-outline" onclick="logout()">Đăng Xuất</a>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <div class="hero">
        <h1>📋 Hồ Sơ Bệnh Án</h1>
    </div>

    <div class="container" style="max-width: 800px; margin: 2rem auto;">
        <div id="alertContainer"></div>
        
        <div class="card">
            <div id="medicalRecordContent">
                <p style="text-align: center; color: #999;">Đang tải hồ sơ bệnh án...</p>
            </div>
        </div>

        <div style="text-align: center; margin-top: 2rem;">
            <a href="/doctor/patients" class="btn btn-secondary">← Quay Lại Danh Sách Bệnh Nhân</a>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 SmartCare. Tất cả quyền được bảo lưu.</p>
    </footer>

    <script>
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('role');
            localStorage.removeItem('username');
            window.location.href = '/';
        }

        function getAppointmentIdFromUrl() {
            const pathParts = window.location.pathname.split('/');
            return pathParts[pathParts.length - 1];
        }

        async function loadMedicalRecord() {
            const token = localStorage.getItem('token');
            const appointmentId = getAppointmentIdFromUrl();
            const container = document.getElementById('medicalRecordContent');

            try {
                const response = await fetch(`/api/v1/appointments/${appointmentId}/medical-records`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                if (data.code === 200 && data.data) {
                    const record = data.data;
                    
                    // Parse prescription JSON
                    let prescriptionHtml = '<p style="color: #999;">Không có đơn thuốc</p>';
                    if (record.prescription) {
                        try {
                            const drugs = JSON.parse(record.prescription);
                            if (drugs.length > 0) {
                                prescriptionHtml = '<ul style="margin: 1rem 0; padding-left: 2rem;">';
                                drugs.forEach(drug => {
                                    prescriptionHtml += `<li>${drug.name} - Số lượng: ${drug.quantity} ${drug.note ? '- ' + drug.note : ''}</li>`;
                                });
                                prescriptionHtml += '</ul>';
                            }
                        } catch (e) {
                            prescriptionHtml = `<p>${record.prescription}</p>`;
                        }
                    }

                    const recordDate = record.createdAt ? new Date(record.createdAt).toLocaleDateString('vi-VN') : 'N/A';

                    const html = `
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem;">
                            <div>
                                <p><strong>Bác Sĩ:</strong> ${record.doctorName}</p>
                                <p><strong>Ngày Ghi Chép:</strong> ${recordDate}</p>
                            </div>
                        </div>

                        <div style="margin-bottom: 2rem;">
                            <h3>Chẩn Đoán Bệnh</h3>
                            <p style="background: #f9f9f9; padding: 1rem; border-radius: 4px; border-left: 4px solid #007bff;">
                                ${record.diagnosis}
                            </p>
                        </div>

                        <div style="margin-bottom: 2rem;">
                            <h3>Đơn Thuốc</h3>
                            <div style="background: #f9f9f9; padding: 1rem; border-radius: 4px;">
                                ${prescriptionHtml}
                            </div>
                        </div>

                        ${record.notes ? `
                        <div style="margin-bottom: 2rem;">
                            <h3>Lời Dặn</h3>
                            <p style="background: #f9f9f9; padding: 1rem; border-radius: 4px; border-left: 4px solid #28a745;">
                                ${record.notes}
                            </p>
                        </div>
                        ` : ''}
                    `;

                    container.innerHTML = html;
                } else {
                    container.innerHTML = `<div class="alert alert-warning">Chưa có hồ sơ bệnh án cho ca khám này</div>`;
                }
            } catch (error) {
                container.innerHTML = `<div class="alert alert-danger">Lỗi tải dữ liệu: ${error.message}</div>`;
            }
        }

        // Check auth khi load trang
        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('token');
            if (!token || localStorage.getItem('role') !== 'DOCTOR') {
                window.location.href = '/login';
            }
            loadMedicalRecord();
        });
    </script>
</body>
</html>
