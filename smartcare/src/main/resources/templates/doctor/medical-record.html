<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghi Chép Y Tế - SmartCare</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="/" class="brand">🏥 SmartCare</a>
            <ul class="nav-links">
                <li><a href="/doctor/dashboard">Dashboard</a></li>
                <li><a href="/doctor/schedules">Quản Lý Lịch</a></li>
                <li><a href="/doctor/patients">Bệnh Nhân</a></li>
            </ul>
            <div class="nav-right">
                <a href="/" class="btn btn-outline" onclick="logout()">Đăng Xuất</a>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <div class="hero">
        <h1>📝 Ghi Chép Y Tế</h1>
    </div>

    <!-- Medical Record Form -->
    <form id="medicalRecordForm" class="container" style="max-width: 600px; margin: 2rem auto;">
        <div id="alertContainer"></div>

        <!-- Hidden Input: Lưu Appointment ID -->
        <input type="hidden" id="appointmentId" name="appointmentId">

        <!-- Chẩn Đoán Bệnh: Bắt buộc -->
        <div class="form-group">
            <label for="diagnosis">Chẩn Đoán Bệnh *</label>
            <textarea id="diagnosis" placeholder="Mô tả chẩn đoán bệnh..." required></textarea>
        </div>

        <!-- Đơn Thuốc: Dynamic Rows -->
        <div class="form-group">
            <label>Đơn Thuốc</label>
            <div id="prescriptionContainer" style="border: 1px solid #ddd; padding: 1rem; border-radius: 4px; background: #f9f9f9; margin-bottom: 1rem;">
                <!-- Các dòng thuốc sẽ được thêm vào đây -->
                <p style="color: #999; text-align: center;">Chưa có thuốc nào. Click "Thêm Thuốc" để bắt đầu.</p>
            </div>
            <button type="button" class="btn btn-secondary" id="addDrugBtn" style="width: 100%; margin-bottom: 1rem;">
                + Thêm Thuốc
            </button>
        </div>

        <!-- Lời Dặn -->
        <div class="form-group">
            <label for="notes">Lời Dặn</label>
            <textarea id="notes" placeholder="Lời dặn cho bệnh nhân..."></textarea>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 1rem;">Lưu Ghi Chép</button>
    </form>

    <footer>
        <p>&copy; 2026 SmartCare. Tất cả quyền được bảo lưu.</p>
    </footer>

    <script>
    let drugRowCounter = 0; // Biến đếm số dòng thuốc

    function checkAuth() {
        const token = localStorage.getItem('token');
        if (!token || localStorage.getItem('role') !== 'DOCTOR') {
            window.location.href = '/login';
        }
    }

    // Lấy ID ca khám từ URL (Ví dụ: /doctor/medical-record/123 -> lấy 123)
    function getAppointmentIdFromUrl() {
        const pathParts = window.location.pathname.split('/');
        return pathParts[pathParts.length - 1]; 
    }

    // =====================================================
    // QUẢN LÝ DÒNG THUỐC ĐỘNG
    // =====================================================

    /**
     * Thêm một dòng thuốc mới
     */
    function addDrugRow() {
        const container = document.getElementById('prescriptionContainer');
        
        // Ẩn text "Chưa có thuốc nào" nếu là dòng đầu tiên
        const emptyMsg = container.querySelector('p');
        if (emptyMsg) emptyMsg.remove();

        // Tạo dòng thuốc mới
        const rowId = `drug-row-${drugRowCounter}`;
        const drugRow = document.createElement('div');
        drugRow.id = rowId;
        drugRow.style.cssText = 'display: grid; grid-template-columns: 2fr 1fr 2fr auto; gap: 0.5rem; margin-bottom: 0.75rem; align-items: end;';
        drugRow.innerHTML = `
            <!-- Tên Thuốc -->
            <input type="text" class="drug-name" placeholder="Tên thuốc..." required>
            
            <!-- Số Lượng -->
            <input type="number" class="drug-quantity" placeholder="Số lượng" min="1" required>
            
            <!-- Lời Dặn -->
            <input type="text" class="drug-note" placeholder="Lời dặn (VD: 2 lần/ngày)">
            
            <!-- Nút Xóa -->
            <button type="button" class="btn btn-danger" 
                    style="padding: 0.4rem 0.8rem; font-size: 0.8rem;" 
                    onclick="removeDrugRow('${rowId}')">
                Xóa
            </button>
        `;

        container.appendChild(drugRow);
        drugRowCounter++;
    }

    /**
     * Xóa một dòng thuốc
     */
    function removeDrugRow(rowId) {
        const element = document.getElementById(rowId);
        if (element) {
            element.remove();
        }

        // Nếu không còn dòng nào, hiển thị lại text "Chưa có thuốc nào"
        const container = document.getElementById('prescriptionContainer');
        if (container.children.length === 0) {
            container.innerHTML = '<p style="color: #999; text-align: center;">Chưa có thuốc nào. Click "Thêm Thuốc" để bắt đầu.</p>';
        }
    }

    /**
     * Thu thập dữ liệu từ các dòng thuốc thành mảng JSON
     */
    function getPrescriptionData() {
        const container = document.getElementById('prescriptionContainer');
        const drugs = [];

        // Lấy tất cả các dòng thuốc
        const drugRows = container.querySelectorAll('[id^="drug-row-"]');
        
        drugRows.forEach(row => {
            const nameInput = row.querySelector('.drug-name');
            const quantityInput = row.querySelector('.drug-quantity');
            const noteInput = row.querySelector('.drug-note');

            if (nameInput.value.trim()) {
                drugs.push({
                    name: nameInput.value.trim(),
                    quantity: parseInt(quantityInput.value) || 1,
                    note: noteInput.value.trim() || ''
                });
            }
        });

        // Trả về chuỗi JSON (hoặc chuỗi rỗng nếu không có thuốc)
        return drugs.length > 0 ? JSON.stringify(drugs) : '';
    }

    // Hàm lưu hồ sơ bệnh án
    async function saveMedicalRecord(e) {
        e.preventDefault();

        const appointmentId = getAppointmentIdFromUrl();
        const diagnosis = document.getElementById('diagnosis').value;
        const prescriptionJson = getPrescriptionData(); // Gom các dòng thuốc thành JSON
        const notes = document.getElementById('notes').value;
        const token = localStorage.getItem('token');
        const alertContainer = document.getElementById('alertContainer');

        try {
            const response = await fetch('/api/v1/medical-records', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    appointmentId: parseInt(appointmentId),
                    diagnosis: diagnosis,
                    prescription: prescriptionJson, // Gửi dưới dạng JSON string
                    notes: notes
                })
            });

            const data = await response.json();

            if (response.ok && data.code === 200) {
                alertContainer.innerHTML = '<div class="alert alert-success">Lưu hồ sơ thành công! Đang quay lại...</div>';
                setTimeout(() => {
                    window.location.href = '/doctor/dashboard';
                }, 1500);
            } else {
                alertContainer.innerHTML = `<div class="alert alert-danger">${data.message || 'Lỗi lưu hồ sơ'}</div>`;
            }
        } catch (error) {
            alertContainer.innerHTML = `<div class="alert alert-danger">Lỗi kết nối máy chủ: ${error.message}</div>`;
        }
    }

    function logout() {
        localStorage.clear();
        window.location.href = '/';
    }

    // =====================================================
    // KHỞI ĐỘNG
    // =====================================================

    checkAuth();

    // Gắn sự kiện cho form submit
    document.getElementById('medicalRecordForm').addEventListener('submit', saveMedicalRecord);

    // Gắn sự kiện cho nút "Thêm Thuốc"
    document.getElementById('addDrugBtn').addEventListener('click', function(e) {
        e.preventDefault();
        addDrugRow();
    });
</script>
</body>
</html>
