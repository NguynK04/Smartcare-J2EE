<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Chat CSKH - SmartCare</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="/" class="brand">🏥 SmartCare</a>
            <ul class="nav-links">
                <li><a href="/admin/dashboard">Dashboard</a></li>
                <li><a href="/admin/doctors">Bác Sĩ</a></li>
                <li><a href="/admin/patients">Bệnh Nhân</a></li>
                <li><a href="/admin/customer-service" class="active">CSKH</a></li>
            </ul>
            <div class="nav-right">
                
                <a href="/" class="btn btn-outline" onclick="logout()">Đăng Xuất</a>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <div class="hero">
        <h1>💬 Quản Lý Chat Hỗ Trợ Khách Hàng</h1>
        <p>Xem và trả lời tin nhắn từ bệnh nhân</p>
    </div>

    <!-- Main Content: 2 Column Layout -->
    <div class="container" style="margin: 2rem auto; display: grid; grid-template-columns: 300px 1fr; gap: 2rem; max-width: 1400px;">
        
        <!-- Sidebar: Patient List -->
        <div class="card">
            <h3>👥 Danh Sách Bệnh Nhân</h3>
            <input type="text" id="searchInput" placeholder="Tìm bệnh nhân..." 
                   style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 1rem;">
            <div id="patientList">
                <p style="text-align: center; color: #999;">Đang tải...</p>
            </div>
        </div>

        <!-- Main Content: Chat Area -->
        <div class="card">
            <div id="noPatientSelected" style="text-align: center; padding: 3rem; color: #999;">
                <p style="font-size: 3rem; margin: 0;">👋</p>
                <p>Chọn bệnh nhân từ bên trái để bắt đầu trò chuyện</p>
            </div>

            <div id="chatArea" style="display: none; display: flex; flex-direction: column; height: 600px;">
                <!-- Chat Header -->
                <div style="padding: 1rem; border-bottom: 1px solid #ddd; background: #f9f9f9; display: flex; justify-content: space-between; align-items: center;">
                    <h3 id="chatPatientName" style="margin: 0;">Tên Bệnh Nhân</h3>
                    <button onclick="closeChat()" class="btn btn-secondary" style="padding: 0.4rem 0.8rem; font-size: 0.8rem;">Đóng</button>
                </div>

                <!-- Chat Messages -->
                <div id="chatMessages" style="flex: 1; overflow-y: auto; padding: 1rem; background: #fafafa;">
                    <!-- Messages will be loaded here -->
                </div>

                <!-- Chat Input -->
                <form id="messageForm" style="padding: 1rem; border-top: 1px solid #ddd; display: flex; gap: 0.5rem;">
                    <input type="text" id="messageInput" placeholder="Nhập tin nhắn..." 
                           style="flex: 1; padding: 0.8rem; border: 1px solid #ddd; border-radius: 4px;">
                    <button type="submit" class="btn btn-primary" style="padding: 0.8rem 1.5rem;">Gửi</button>
                </form>
            </div>
        </div>

    </div>

    <footer>
        <p>&copy; 2026 SmartCare. Tất cả quyền được bảo lưu.</p>
    </footer>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        // Global Variables
        let socket;
        let currentUserId;
        let selectedPatientId = null;
        let allPatients = [];

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('role');
            localStorage.removeItem('username');
            localStorage.removeItem('userId');
            window.location.href = '/';
        }

        function checkAuth() {
            const token = localStorage.getItem('token');
            const role = localStorage.getItem('role');
            const userId = localStorage.getItem('userId');
            
            console.log('🔐 Auth Info:');
            console.log('   Token:', token ? token.substring(0, 20) + '...' : '❌ KHÔNG CÓ');
            console.log('   Role:', role || '❌ KHÔNG CÓ');
            console.log('   UserId:', userId || '❌ KHÔNG CÓ');
            
            if (!token || role !== 'STAFF') {
                console.error('❌ Không phải STAFF user, redirect đi');
                window.location.href = '/login';
            }
            currentUserId = userId;
        }

        async function loadPatientList() {
            const token = localStorage.getItem('token');
            const patientListContainer = document.getElementById('patientList');

            console.log('🔑 Token tìm kiếm:', token ? '✅ Có' : '❌ Không có');
            console.log('🔐 Full token:', 'Bearer ' + token);

            try {
                const response = await fetch('/api/v1/chat/partners', {
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                console.log('📊 Response status:', response.status);
                const data = await response.json();
                console.log('📥 Response data:', data);

                if (data.code === 200 && data.data) {
                    allPatients = data.data;
                    renderPatientList(allPatients);
                } else {
                    patientListContainer.innerHTML = '<p style="text-align: center; color: #999;">Không có bệnh nhân nào</p>';
                }
            } catch (error) {
                console.error('❌ Lỗi tải danh sách bệnh nhân:', error);
                patientListContainer.innerHTML = '<p style="text-align: center; color: #900;">Lỗi tải dữ liệu: ' + error.message + '</p>';
            }
        }

        function renderPatientList(patients) {
            const patientListContainer = document.getElementById('patientList');
            let html = '';

            patients.forEach(patient => {
                const lastMsg = patient.lastMessage || 'Chưa có tin nhắn';
                html += `
                    <div class="card" style="padding: 1rem; margin-bottom: 0.8rem; cursor: pointer; background: #f9f9f9; border-left: 4px solid #007bff; transition: all 0.3s;"
                         id="patient-${patient.userId}"
                         onclick="selectPatient(${patient.userId}, '${patient.fullName}')"
                         onmouseover="this.style.background='#e7f3ff'"
                         onmouseout="this.style.background='#f9f9f9'">
                        <p style="margin: 0; font-weight: bold; font-size: 0.95rem;">${patient.fullName}</p>
                        <p style="margin: 0.3rem 0 0 0; font-size: 0.8rem; color: #666;">${patient.email}</p>
                        <p style="margin: 0.3rem 0 0 0; font-size: 0.75rem; color: #999; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;">
                            ${lastMsg}
                        </p>
                        <p style="margin: 0.3rem 0 0 0; font-size: 0.7rem; color: #ccc;">
                            ${patient.lastMessageTime ? new Date(patient.lastMessageTime).toLocaleTimeString('vi-VN') : ''}
                        </p>
                    </div>
                `;
            });

            patientListContainer.innerHTML = html;
        }

        function selectPatient(patientId, patientName) {
            selectedPatientId = patientId;

            // Show chat area
            document.getElementById('noPatientSelected').style.display = 'none';
            document.getElementById('chatArea').style.display = 'flex';

            // Update header
            document.getElementById('chatPatientName').textContent = patientName;

            // Highlight selected patient
            document.querySelectorAll('#patientList .card').forEach(el => {
                el.style.borderLeft = '4px solid #ddd';
                el.style.background = '#f9f9f9';
            });
            document.getElementById(`patient-${patientId}`).style.borderLeft = '4px solid #28a745';
            document.getElementById(`patient-${patientId}`).style.background = '#e8f5e9';

            // Load chat history
            loadChatHistory(patientId);

            // Emit user-login to Socket.io
            if (socket) {
                socket.emit('user-login', currentUserId);
            }
        }

        function closeChat() {
            selectedPatientId = null;
            document.getElementById('noPatientSelected').style.display = 'block';
            document.getElementById('chatArea').style.display = 'none';
        }

        async function loadChatHistory(patientId) {
            const token = localStorage.getItem('token');
            const chatMessagesContainer = document.getElementById('chatMessages');

            try {
                const response = await fetch(`/api/v1/chat/history/${patientId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                if (data.code === 200 && data.data) {
                    let messagesHtml = '';
                    data.data.forEach(msg => {
                        const isFromStaff = msg.senderId == currentUserId;
                        const alignment = isFromStaff ? 'flex-end' : 'flex-start';
                        const bgColor = isFromStaff ? '#007bff' : '#e9ecef';
                        const textColor = isFromStaff ? '#fff' : '#000';
                        const sender = msg.senderName || 'Unknown';

                        messagesHtml += `
                            <div style="display: flex; justify-content: ${alignment}; margin-bottom: 1rem;">
                                <div style="max-width: 70%;">
                                    ${!isFromStaff ? `<p style="margin: 0 0 0.3rem 0; font-size: 0.75rem; color: #666; font-weight: bold;">${sender}</p>` : ''}
                                    <div style="background: ${bgColor}; color: ${textColor}; padding: 0.8rem; border-radius: 8px; word-wrap: break-word;">
                                        <p style="margin: 0; font-size: 0.9rem;">${escapeHtml(msg.messageContent)}</p>
                                        <p style="margin: 0.3rem 0 0 0; font-size: 0.7rem; opacity: 0.7;">
                                            ${new Date(msg.createdAt).toLocaleTimeString('vi-VN')}
                                        </p>
                                    </div>
                                </div>
                            </div>
                        `;
                    });

                    chatMessagesContainer.innerHTML = messagesHtml || '<p style="text-align: center; color: #999;">Chưa có tin nhắn nào. Hãy gửi lời chào!</p>';
                    chatMessagesContainer.scrollTop = chatMessagesContainer.scrollHeight;
                }
            } catch (error) {
                console.error('Lỗi tải lịch sử chat:', error);
            }
        }

        async function sendMessage(e) {
            e.preventDefault();

            if (!selectedPatientId) {
                alert('Vui lòng chọn bệnh nhân!');
                return;
            }

            const messageInput = document.getElementById('messageInput');
            const messageContent = messageInput.value.trim();
            const token = localStorage.getItem('token');

            if (!messageContent) return;

            try {
                const response = await fetch('/api/v1/chat/send', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        receiverId: selectedPatientId,
                        messageContent: messageContent
                    })
                });

                const data = await response.json();

                if (data.code === 201) {
                    messageInput.value = '';
                    loadChatHistory(selectedPatientId);
                } else {
                    alert('Lỗi gửi tin nhắn: ' + data.message);
                }
            } catch (error) {
                alert('Lỗi: ' + error.message);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Socket.io for real-time updates
        function initSocket() {
            socket = io('http://localhost:3001', {
                reconnection: true,
                reconnectionDelay: 1000,
                reconnectionDelayMax: 5000,
                reconnectionAttempts: 5
            });

            socket.on('connect', () => {
                console.log('✅ Connected to Socket.io server');
                stopPolling(); // Stop polling nếu Socket.io đã hoạt động
                socket.emit('user-login', currentUserId);
            });

            socket.on('receive-message', (message) => {
                console.log('📥 Nhận tin nhắn real-time:', message);
                // Reload patient list và chat nếu message từ selected patient
                loadPatientList();
                if (selectedPatientId && message.senderId == selectedPatientId) {
                    loadChatHistory(selectedPatientId);
                }
            });

            socket.on('disconnect', () => {
                console.log('❌ Disconnected from Socket.io');
            });

            socket.on('connect_error', (error) => {
                console.warn('⚠️ Socket.io connection error:', error);
                // Nếu Socket.io lỗi, fallback dùng polling
                startPolling();
            });
        }

        // Fallback: Polling nếu Socket.io không hoạt động
        let pollingInterval = null;
        function startPolling() {
            if (pollingInterval) return; // Chỉ start 1 lần
            
            console.log('📡 Fallback: Bắt đầu polling mỗi 1.5 giây...');
            pollingInterval = setInterval(() => {
                loadPatientList();
                if (selectedPatientId) {
                    loadChatHistory(selectedPatientId);
                }
            }, 1500); // Poll mỗi 1.5 giây - nhanh hơn
        }

        function stopPolling() {
            if (pollingInterval) {
                clearInterval(pollingInterval);
                pollingInterval = null;
                console.log('🛑 Dừng polling');
            }
        }

        // Search functionality
        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
            loadPatientList();
            initSocket();

            document.getElementById('messageForm').addEventListener('submit', sendMessage);

            // Search patients
            document.getElementById('searchInput').addEventListener('input', function(e) {
                const searchText = e.target.value.toLowerCase();
                const filtered = allPatients.filter(p => 
                    p.fullName.toLowerCase().includes(searchText) || 
                    p.email.toLowerCase().includes(searchText)
                );
                renderPatientList(filtered);
            });
        });
    </script>
</body>
</html>
