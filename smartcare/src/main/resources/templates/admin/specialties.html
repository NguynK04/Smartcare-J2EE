<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Chuyên Khoa - SmartCare</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="/" class="brand">🏥 SmartCare</a>
            <ul class="nav-links">
                <li><a href="/admin/dashboard">Dashboard</a></li>
                <li><a href="/admin/doctors">Quản Lý Bác Sĩ</a></li>
                <li><a href="/admin/patients">Quản Lý Bệnh Nhân</a></li>
                <li><a href="/admin/specialties">Chuyên Khoa</a></li>
                <li><a href="/admin/stats">Thống Kê</a></li>
            </ul>
            <div class="nav-right">
                <a href="/" class="btn btn-outline" onclick="logout()">Đăng Xuất</a>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <div class="hero">
        <h1>🏥 Quản Lý Chuyên Khoa</h1>
    </div>

    <!-- Main Content -->
    <div class="container" style="margin: 2rem auto;">
        <!-- Add Specialty Form -->
        <div class="card">
            <h3>➕ Thêm Chuyên Khoa Mới</h3>
            <form id="specialtyForm">
                <div class="form-group">
                    <label for="name">Tên Chuyên Khoa</label>
                    <input type="text" id="name" placeholder="VD: Khoa Nội" required>
                </div>

                <div class="form-group">
                    <label for="description">Mô Tả</label>
                    <textarea id="description" placeholder="Mô tả chuyên khoa..."></textarea>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Thêm</button>
            </form>
        </div>

        <!-- Specialties List -->
        <div class="card" style="margin-top: 2rem;">
            <h3>📋 Danh Sách Chuyên Khoa</h3>
            <div id="specialtiesTable">
                <p style="text-align: center; color: #999;">Đang tải...</p>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 SmartCare. Tất cả quyền được bảo lưu.</p>
    </footer>

    <script>
        function checkAuth() {
            const token = localStorage.getItem('token');
            const role = localStorage.getItem('role');
            
            if (!token || role !== 'ADMIN') {
                window.location.href = '/login';
            }
        }

        async function addSpecialty(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const description = document.getElementById('description').value;
            const token = localStorage.getItem('token');

            try {
                const response = await fetch('/api/v1/admin/specialties', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name, description })
                });

                if (response.ok) {
                    alert('Thêm chuyên khoa thành công!');
                    document.getElementById('specialtyForm').reset();
                    loadSpecialties();
                } else {
                    alert('Lỗi thêm chuyên khoa');
                }
            } catch (error) {
                alert(`Lỗi: ${error.message}`);
            }
        }

        async function loadSpecialties() {
            const token = localStorage.getItem('token');
            const container = document.getElementById('specialtiesTable');

            try {
                const response = await fetch('/api/v1/specialties', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                if (data.code === 200 && data.data.length > 0) {
                    let html = `<table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Tên</th>
                                <th>Mô Tả</th>
                                <th>Hành Động</th>
                            </tr>
                        </thead>
                        <tbody>`;

                    data.data.forEach(specialty => {
                        html += `<tr>
                            <td>${specialty.id}</td>
                            <td>${specialty.name}</td>
                            <td>${specialty.description || 'N/A'}</td>
                            <td>
                                <button onclick="deleteSpecialty(${specialty.id})" class="btn btn-danger" style="font-size: 0.8rem; padding: 0.4rem 0.8rem;">Xóa</button>
                            </td>
                        </tr>`;
                    });

                    html += `</tbody></table>`;
                    container.innerHTML = html;
                } else {
                    container.innerHTML = `<p style="text-align: center; color: #999;">Không có chuyên khoa nào</p>`;
                }
            } catch (error) {
                container.innerHTML = `<div class="alert alert-danger">Lỗi tải dữ liệu: ${error.message}</div>`;
            }
        }

        async function deleteSpecialty(specialtyId) {
            if (!confirm('Bạn có chắc chắn muốn xóa?')) return;

            const token = localStorage.getItem('token');

            try {
                const response = await fetch(`/api/v1/specialties/${specialtyId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    alert('Xóa thành công!');
                    loadSpecialties();
                } else {
                    alert('Lỗi xóa');
                }
            } catch (error) {
                alert(`Lỗi: ${error.message}`);
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('role');
            localStorage.removeItem('username');
            window.location.href = '/';
        }

        document.getElementById('specialtyForm').addEventListener('submit', addSpecialty);
        checkAuth();
        loadSpecialties();
    </script>
</body>
</html>
