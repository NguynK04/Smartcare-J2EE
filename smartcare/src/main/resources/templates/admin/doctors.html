<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Bác Sĩ - SmartCare</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="/" class="brand">🏥 SmartCare</a>
            <ul class="nav-links">
                <li><a href="/admin/dashboard">Dashboard</a></li>
                <li><a href="/admin/doctors">Quản Lý Bác Sĩ</a></li>
                <li><a href="/admin/patients">Quản Lý Bệnh Nhân</a></li>
                <li><a href="/admin/specialties">Chuyên Khoa</a></li>
                <li><a href="/admin/stats">Thống Kê</a></li>
            </ul>
            <div class="nav-right">
                <a href="/" class="btn btn-outline" onclick="logout()">Đăng Xuất</a>
            </div>
        </div>
    </nav>

    <div class="hero">
        <h1>👨‍⚕️ Quản Lý Bác Sĩ</h1>
    </div>

    <div class="container" style="margin: 2rem auto;">
        <div class="card">
            <h3>Danh Sách Bác Sĩ</h3>
            <div id="doctorsTable">
                <p style="text-align: center; color: #999;">Đang tải...</p>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 SmartCare. Tất cả quyền được bảo lưu.</p>
    </footer>

    <script>
    function checkAuth() {
        const token = localStorage.getItem('token');
        const role = localStorage.getItem('role');
        
        if (!token || role !== 'ADMIN') {
            window.location.href = '/login';
        }
    }

    async function loadDoctors() {
        const token = localStorage.getItem('token');
        const container = document.getElementById('doctorsTable');

        try {
            const response = await fetch('/api/v1/admin/doctors', {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            const data = await response.json();

            if (data.code === 200 && data.data.length > 0) {
                let html = `<table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tên</th>
                            <th>Email</th>
                            <th>Chuyên Khoa</th>
                            <th>Giấy Phép</th>
                            <th>CV</th>
                            <th>Trạng Thái</th>
                            <th>Hành Động</th>
                        </tr>
                    </thead>
                    <tbody>`;

                data.data.forEach(doctor => {
                    // 🛠️ ĐÃ SỬA CHỖ NÀY: Đồng bộ với biến active của Backend
                    let isDoctorActive = doctor.active !== undefined ? doctor.active : doctor.isActive;

                    let statusBadge = '';
                    let actions = '';

                    if (isDoctorActive === true) {
                        statusBadge = '<span class="badge" style="background: #28a745;">Đã Duyệt (Active)</span>';
                        actions = `<button onclick="toggleDoctorStatus(${doctor.id}, true)" class="btn btn-danger" style="font-size: 0.8rem; padding: 0.4rem 0.8rem;">Khóa</button>`;
                    } else {
                        statusBadge = '<span class="badge" style="background: #ffcc00; color: #000;">Chờ Duyệt / Bị Khóa</span>';
                        actions = `<button onclick="approveDoctor(${doctor.id})" class="btn btn-success" style="font-size: 0.8rem; padding: 0.4rem 0.8rem;">Duyệt / Mở Khóa</button>`;
                    }

                    // 🛠️ FIX LỖI [object Object]: Xử lý tên Chuyên khoa linh hoạt
                    let specialtyDisplay = 'N/A';
                    if (doctor.specialty && typeof doctor.specialty === 'object') {
                        specialtyDisplay = doctor.specialty.name || 'N/A';
                    } else if (doctor.specialtyName) {
                        specialtyDisplay = doctor.specialtyName;
                    } else if (doctor.specialty) {
                        specialtyDisplay = doctor.specialty;
                    }

                    // Xử lý hiển thị CV
                    let cvDisplay = doctor.cvFilePath ? 
                        `<a href="/${doctor.cvFilePath}" target="_blank" class="btn btn-primary" style="font-size: 0.75rem; padding: 0.3rem 0.6rem;">👁️ Xem</a>` 
                        : '<span style="color: #999;">Chưa có CV</span>';

                    // Giấy phép
                    let licenseDisplay = doctor.licenseNumber || 'N/A';

                    html += `<tr>
                        <td>${doctor.id}</td>
                        <td>${doctor.fullName}</td>
                        <td>${doctor.email}</td>
                        <td>${specialtyDisplay}</td>
                        <td>${licenseDisplay}</td>
                        <td>${cvDisplay}</td>
                        <td>${statusBadge}</td>
                        <td>${actions}</td>
                    </tr>`;
                });

                html += `</tbody></table>`;
                container.innerHTML = html;
            } else {
                container.innerHTML = `<p style="text-align: center; color: #999;">Không có bác sĩ nào</p>`;
            }
        } catch (error) {
            container.innerHTML = `<div class="alert alert-danger">Lỗi tải dữ liệu: ${error.message}</div>`;
        }
    }

    async function approveDoctor(doctorId) {
        if (!confirm('Bạn xác nhận duyệt (hoặc mở khóa) bác sĩ này?')) return;
        const token = localStorage.getItem('token');

        try {
            const response = await fetch(`/api/v1/admin/doctors/${doctorId}/approve`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (response.ok) {
                alert('Thao tác thành công!');
                loadDoctors(); 
            } else {
                const errorData = await response.json();
                alert(`Lỗi: ${errorData.message || 'Không thể thực hiện!'}`);
            }
        } catch (error) {
            alert(`Lỗi kết nối: ${error.message}`);
        }
    }

    async function toggleDoctorStatus(userId, currentStatus) {
        const actionText = currentStatus === false ? "MỞ KHÓA" : "KHÓA";
        if (!confirm(`Bạn có chắc muốn ${actionText} tài khoản này?`)) return;
        
        const token = localStorage.getItem('token');

        try {
            const response = await fetch(`/api/v1/admin/users/${userId}/toggle-status`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (response.ok) {
                alert('Cập nhật trạng thái thành công!');
                loadDoctors(); 
            } else {
                const errorData = await response.json();
                alert(`Lỗi: ${errorData.message || 'Không thể cập nhật trạng thái!'}`);
            }
        } catch (error) {
            alert(`Lỗi kết nối: ${error.message}`);
        }
    }

    function logout() {
        localStorage.removeItem('token');
        localStorage.removeItem('role');
        localStorage.removeItem('username');
        window.location.href = '/';
    }

    checkAuth();
    loadDoctors();
    </script>
</body>
</html>
