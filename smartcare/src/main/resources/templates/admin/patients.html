<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Bệnh Nhân - SmartCare</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="/" class="brand">🏥 SmartCare</a>
            <ul class="nav-links">
                <li><a href="/admin/dashboard">Dashboard</a></li>
                <li><a href="/admin/doctors">Quản Lý Bác Sĩ</a></li>
                <li><a href="/admin/patients">Quản Lý Bệnh Nhân</a></li>
                <li><a href="/admin/specialties">Chuyên Khoa</a></li>
                <li><a href="/admin/stats">Thống Kê</a></li>
            </ul>
            <div class="nav-right">
                <a href="/" class="btn btn-outline" onclick="logout()">Đăng Xuất</a>
            </div>
        </div>
    </nav>

    <div class="hero">
        <h1>👥 Quản Lý Bệnh Nhân</h1>
    </div>

    <div class="container" style="margin: 2rem auto;">
        <div class="card">
            <h3>Danh Sách Bệnh Nhân</h3>
            <div id="patientsTable">
                <p style="text-align: center; color: #999;">Đang tải...</p>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 SmartCare. Tất cả quyền được bảo lưu.</p>
    </footer>

    <script>
    function checkAuth() {
        const token = localStorage.getItem('token');
        if (!token || localStorage.getItem('role') !== 'ADMIN') {
            window.location.href = '/login';
        }
    }

    async function loadPatients() {
        const token = localStorage.getItem('token');
        const container = document.getElementById('patientsTable');

        try {
            const response = await fetch('/api/v1/admin/patients', {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            const data = await response.json();

            if (data.code === 200 && data.data.length > 0) {
                let html = `<table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tên Bệnh Nhân</th>
                            <th>Email</th>
                            <th>Số Điện Thoại</th>
                            <th>Trạng Thái</th>
                            <th>Hành Động</th>
                        </tr>
                    </thead>
                    <tbody>`;

                data.data.forEach(patient => {
                    let isPatientActive = patient.active !== undefined ? patient.active : patient.isActive;

                    let statusBadge = isPatientActive 
                        ? '<span class="badge" style="background: #28a745;">Đang Hoạt Động</span>'
                        : '<span class="badge" style="background: #dc3545;">Đã Khóa</span>';

                    const btnClass = isPatientActive ? "btn-danger" : "btn-warning";
                    const btnText = isPatientActive ? "Khóa" : "Mở Khóa";
                    
                    // Tái sử dụng lại hàm toggleUserStatus dùng chung với Bác sĩ
                    let actions = `<button onclick="toggleUserStatus(${patient.id}, ${isPatientActive})" class="btn ${btnClass}" style="font-size: 0.8rem; padding: 0.4rem 0.8rem;">${btnText}</button>`;

                    html += `<tr>
                        <td>${patient.id}</td>
                        <td>${patient.fullName}</td>
                        <td>${patient.email}</td>
                        <td>${patient.phone || 'N/A'}</td>
                        <td>${statusBadge}</td>
                        <td>${actions}</td>
                    </tr>`;
                });

                html += `</tbody></table>`;
                container.innerHTML = html;
            } else {
                container.innerHTML = `<p style="text-align: center; color: #999;">Không có bệnh nhân nào</p>`;
            }
        } catch (error) {
            container.innerHTML = `<div class="alert alert-danger">Lỗi tải dữ liệu: ${error.message}</div>`;
        }
    }

    async function toggleUserStatus(userId, currentStatus) {
        const actionText = currentStatus === false ? "MỞ KHÓA" : "KHÓA";
        if (!confirm(`Bạn có chắc muốn ${actionText} tài khoản này?`)) return;
        
        const token = localStorage.getItem('token');

        try {
            const response = await fetch(`/api/v1/admin/users/${userId}/toggle-status`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (response.ok) {
                alert('Cập nhật trạng thái thành công!');
                loadPatients(); 
            } else {
                const errorData = await response.json();
                alert(`Lỗi: ${errorData.message || 'Không thể thực hiện!'}`);
            }
        } catch (error) {
            alert(`Lỗi kết nối: ${error.message}`);
        }
    }

    function logout() {
        localStorage.clear();
        window.location.href = '/';
    }

    checkAuth();
    loadPatients();
    </script>
</body>
</html>
