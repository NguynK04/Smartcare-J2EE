<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Hỗ Trợ - SmartCare</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="/" class="brand">🏥 SmartCare</a>
            <ul class="nav-links">
                <li><a href="/patient/dashboard">Dashboard</a></li>
                <li><a href="/patient/search-doctors">Tìm Bác Sĩ</a></li>
                <li><a href="/patient/appointments">Lịch Khám</a></li>
            </ul>
            <div class="nav-right">
                <a href="/patient/profile">👤 Hồ Sơ</a>
                <a href="/" class="btn btn-outline" onclick="logout()">Đăng Xuất</a>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <div class="hero">
        <h1>💬 Chat Hỗ Trợ</h1>
        <p>Liên hệ với Đội ngũ Hỗ trợ Khách hàng</p>
    </div>

    <!-- Chat Screen -->
    <div class="container" style="max-width: 900px; margin: 2rem auto; display: grid; grid-template-columns: 1fr 2fr; gap: 2rem;">
        
        <!-- Customer Service Staff List -->
        <div class="card">
            <h3>🎧 Đội Ngũ Hỗ Trợ</h3>
            <div id="staffList">
                <p style="text-align: center; color: #999;">Đang tải...</p>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="card">
            <div id="chatArea" style="display: none;">
                <p style="text-align: center; color: #999;">Chọn người hỗ trợ từ bên trái để bắt đầu chat</p>
            </div>

            <div id="chatboxContainer">
                <div id="chatbox" style="height: 400px; border: 1px solid #ddd; border-radius: 4px; padding: 1rem; overflow-y: auto; background: #f9f9f9; margin-bottom: 1rem; display: none;">
                    <!-- Chat messages will be loaded here -->
                </div>

                <form id="messageForm" style="display: none;">
                    <div style="display: flex; gap: 0.5rem;">
                        <input type="text" id="messageInput" placeholder="Nhập tin nhắn..." style="flex: 1; padding: 0.8rem; border: 1px solid #ddd; border-radius: 4px;">
                        <button type="submit" class="btn btn-primary" style="padding: 0.8rem 1.5rem;">Gửi</button>
                    </div>
                </form>
            </div>
        </div>

    </div>

    <footer>
        <p>&copy; 2026 SmartCare. Tất cả quyền được bảo lưu.</p>
    </footer>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        // Global Variables
        let socket;
        let currentUserId;
        let selectedStaffId = null;

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('role');
            localStorage.removeItem('username');
            localStorage.removeItem('userId');
            window.location.href = '/';
        }

        function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token || localStorage.getItem('role') !== 'PATIENT') {
                window.location.href = '/login';
            }
            currentUserId = localStorage.getItem('userId');
        }

        async function loadStaffList() {
            // For now, show a hardcoded customer service staff
            // In production, this would fetch from API
            const staffList = document.getElementById('staffList');
            
            const staffMembers = [
                { id: 1, name: 'Nguyễn Văn Hỗ Trợ', title: 'CSKH' },
                { id: 2, name: 'Trần Thị Phục Vụ', title: 'CSKH' },
                { id: 3, name: 'Hoàng Văn Chăm Sóc', title: 'CSKH' }
            ];

            let html = '';
            staffMembers.forEach(staff => {
                html += `
                    <div class="card" style="padding: 1rem; margin-bottom: 0.5rem; cursor: pointer; background: #f9f9f9; border-left: 4px solid #007bff; transition: all 0.3s;" 
                         onclick="selectStaff(${staff.id}, '${staff.name}')" 
                         onmouseover="this.style.background='#e7f3ff'" 
                         onmouseout="this.style.background='#f9f9f9'">
                        <p><strong>${staff.name}</strong></p>
                        <p style="font-size: 0.8rem; color: #999;">${staff.title}</p>
                    </div>
                `;
            });
            staffList.innerHTML = html;
        }

        async function selectStaff(staffId, staffName) {
            selectedStaffId = staffId;
            
            // Show chat area
            document.getElementById('chatArea').style.display = 'block';
            document.getElementById('chatbox').style.display = 'block';
            document.getElementById('messageForm').style.display = 'block';

            // Highlight selected staff
            document.querySelectorAll('#staffList .card').forEach(el => {
                el.style.borderLeft = '4px solid #ddd';
                el.style.background = '#f9f9f9';
            });
            event.currentTarget.style.borderLeft = '4px solid #28a745';
            event.currentTarget.style.background = '#e8f5e9';

            // Load chat history
            await loadChatHistory(staffId);

            // Emit user-login event to Socket.io for real-time chat
            if (socket) {
                socket.emit('user-login', currentUserId);
            }
        }

        async function loadChatHistory(staffId) {
            const token = localStorage.getItem('token');
            const chatbox = document.getElementById('chatbox');

            try {
                const response = await fetch(`/api/v1/chat/history/${staffId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                if (data.code === 200 && data.data) {
                    let chatHtml = '';
                    data.data.forEach(msg => {
                        const isFromMe = msg.senderId == currentUserId;
                        const alignment = isFromMe ? 'flex-end' : 'flex-start';
                        const bgColor = isFromMe ? '#007bff' : '#e9ecef';
                        const textColor = isFromMe ? '#fff' : '#000';

                        chatHtml += `
                            <div style="display: flex; justify-content: ${alignment}; margin-bottom: 0.8rem;">
                                <div style="background: ${bgColor}; color: ${textColor}; padding: 0.8rem; border-radius: 8px; max-width: 70%; word-wrap: break-word;">
                                    <p style="margin: 0; font-size: 0.9rem;">${escapeHtml(msg.messageContent)}</p>
                                    <p style="margin: 0.3rem 0 0 0; font-size: 0.7rem; opacity: 0.7;">
                                        ${new Date(msg.createdAt).toLocaleTimeString('vi-VN')}
                                    </p>
                                </div>
                            </div>
                        `;
                    });
                    chatbox.innerHTML = chatHtml || '<p style="text-align: center; color: #999;">Chưa có tin nhắn nào</p>';
                    chatbox.scrollTop = chatbox.scrollHeight; // Auto scroll to bottom
                }
            } catch (error) {
                console.error('Lỗi tải lịch sử chat:', error);
            }
        }

        async function sendMessage(e) {
            e.preventDefault();

            if (!selectedStaffId) {
                alert('Vui lòng chọn người hỗ trợ!');
                return;
            }

            const messageInput = document.getElementById('messageInput');
            const messageContent = messageInput.value.trim();
            const token = localStorage.getItem('token');

            if (!messageContent) return;

            try {
                // Send via REST API
                const response = await fetch('/api/v1/chat/send', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        receiverId: selectedStaffId,
                        messageContent: messageContent
                    })
                });

                const data = await response.json();

                if (data.code === 201) {
                    // Clear input
                    messageInput.value = '';
                    
                    // Reload chat
                    await loadChatHistory(selectedStaffId);
                } else {
                    alert('Lỗi gửi tin nhắn: ' + data.message);
                }
            } catch (error) {
                alert('Lỗi: ' + error.message);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Socket.io for real-time chat
        function initSocket() {
            socket = io('http://localhost:3001', {
                reconnection: true,
                reconnectionDelay: 1000,
                reconnectionDelayMax: 5000,
                reconnectionAttempts: 5
            });

            socket.on('connect', () => {
                console.log('✅ Connected to Socket.io server');
                socket.emit('user-login', currentUserId);
            });

            socket.on('receive-message', (message) => {
                // Automatically reload if message is from selected staff
                if (selectedStaffId && message.senderId == selectedStaffId) {
                    loadChatHistory(selectedStaffId);
                }
            });

            socket.on('disconnect', () => {
                console.log('❌ Disconnected from Socket.io');
            });
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
            loadStaffList();
            initSocket();

            // Attach form submission
            document.getElementById('messageForm').addEventListener('submit', sendMessage);
        });
    </script>
</body>
</html>
