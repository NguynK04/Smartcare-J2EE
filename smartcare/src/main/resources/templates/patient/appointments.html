<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch Khám Của Bạn - SmartCare</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="/" class="brand">🏥 SmartCare</a>
            <ul class="nav-links">
                <li><a href="/patient/dashboard">Dashboard</a></li>
                <li><a href="/patient/search-doctors">Tìm Bác Sĩ</a></li>
                <li><a href="/patient/appointments">Lịch Khám</a></li>
            </ul>
            <div class="nav-right">
                <a href="/patient/profile">👤 Hồ Sơ</a>
                <a href="/" class="btn btn-outline" onclick="logout()">Đăng Xuất</a>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <div class="hero">
        <h1>📅 Lịch Khám Của Bạn</h1>
        <p>Quản lý và xem lịch sử khám bệnh</p>
    </div>

    <!-- Main Content -->
    <div class="container" style="margin: 2rem auto;">
        <div class="card">
            <h3>Danh Sách Lịch Khám</h3>
            <div id="appointmentsTable">
                <p style="text-align: center; color: #999;">Đang tải...</p>
            </div>
        </div>
    </div>

    <!-- Modal for booking new appointment -->
    <div id="bookModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeBookModal()">&times;</span>
            <h2>Đặt Lịch Khám</h2>
            <form id="bookForm">
                <div class="form-group">
                    <label for="scheduleId">Chọn Lịch Khám</label>
                    <select id="scheduleId" required>
                        <option value="">-- Chọn ca khám --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="reason">Lý Do Khám</label>
                    <textarea id="reason" placeholder="Mô tả lý do khám..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Đặt Lịch</button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 SmartCare. Tất cả quyền được bảo lưu.</p>
    </footer>

    <script>
        function checkAuth() {
            const token = localStorage.getItem('token');
            const role = localStorage.getItem('role');
            
            if (!token || role !== 'PATIENT') {
                window.location.href = '/login';
            }
        }

        async function loadAppointments() {
            const token = localStorage.getItem('token');
            const container = document.getElementById('appointmentsTable');

            try {
                const response = await fetch('/api/v1/appointments/my-history', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                if (data.code === 200 && data.data.length > 0) {
                    let html = `<table>
                        <thead>
                            <tr>
                                <th>Bác Sĩ</th>
                                <th>Ngày Khám</th>
                                <th>Giờ</th>
                                <th>Lý Do</th>
                                <th>Trạng Thái</th>
                                <th>Hành Động</th>
                            </tr>
                        </thead>
                        <tbody>`;

                    data.data.forEach(appt => {
                        const statusBadge = `<span class="badge badge-${appt.status.toLowerCase()}">${appt.status}</span>`;
                        let actions = '';
                        if (appt.status === 'PENDING') {
                            actions = `<button onclick="cancelAppointment(${appt.appointmentId})" class="btn btn-danger" style="font-size: 0.8rem; padding: 0.4rem 0.8rem;">Hủy</button>`;
                        } else if (appt.status === 'COMPLETED') {
                            actions = `<div style="display: flex; gap: 0.5rem; flex-wrap: wrap; font-size: 0.8rem;">
                                <a href="/patient/review/${appt.appointmentId}" class="btn btn-secondary" style="padding: 0.4rem 0.8rem; text-decoration: none;">Đánh Giá</a>
                                <a href="/patient/medical-record-detail/${appt.appointmentId}" class="btn btn-info" style="padding: 0.4rem 0.8rem; text-decoration: none; background-color: #17a2b8;">Xem Bệnh Án</a>
                            </div>`;
                        } else {
                            actions = `<span style="font-size: 0.8rem; color: #999;">-</span>`;
                        }

                        html += `<tr>
                            <td>${appt.doctorName}</td>
                            <td>${appt.workDate}</td>
                            <td>${appt.startTime} - ${appt.endTime}</td>
                            <td>${appt.reason || 'N/A'}</td>
                            <td>${statusBadge}</td>
                            <td>${actions}</td>
                        </tr>`;
                    });

                    html += `</tbody></table>`;
                    container.innerHTML = html;
                } else {
                    container.innerHTML = `<p style="text-align: center; color: #999;">Chưa có lịch khám nào</p>`;
                }
            } catch (error) {
                container.innerHTML = `<div class="alert alert-danger">Lỗi tải dữ liệu: ${error.message}</div>`;
            }
        }

        async function cancelAppointment(appointmentId) {
            if (!confirm('Bạn có chắc chắn muốn hủy lịch khám này?')) return;

            const token = localStorage.getItem('token');

            try {
                const response = await fetch(`/api/v1/appointments/${appointmentId}/cancel`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                if (response.ok) {
                    alert(data.message);
                    loadAppointments();
                } else {
                    alert(`Lỗi: ${data.message}`);
                }
            } catch (error) {
                alert(`Lỗi: ${error.message}`);
            }
        }

        function closeBookModal() {
            document.getElementById('bookModal').classList.remove('active');
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('role');
            localStorage.removeItem('username');
            window.location.href = '/';
        }

        checkAuth();
        loadAppointments();
    </script>
</body>
</html>
