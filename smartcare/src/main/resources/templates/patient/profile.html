<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ Sơ Cá Nhân - SmartCare</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="/" class="brand">🏥 SmartCare</a>
            <div class="nav-right">
                <a href="/" class="btn btn-outline" onclick="logout()">Đăng Xuất</a>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <div class="hero">
        <h1>👤 Hồ Sơ Cá Nhân</h1>
    </div>

    <!-- Profile Form -->
    <form id="profileForm" class="container" style="max-width: 600px; margin: 2rem auto;">
        <div id="alertContainer"></div>

        <div class="form-group">
            <label for="fullName">Họ và Tên</label>
            <input type="text" id="fullName" placeholder="Họ và tên">
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Email" readonly>
        </div>

        <div class="form-group">
            <label for="phone">Số Điện Thoại</label>
            <input type="tel" id="phone" placeholder="Số điện thoại">
        </div>

        <div class="form-group">
            <label for="address">Địa Chỉ</label>
            <input type="text" id="address" placeholder="Địa chỉ">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 1rem;">Cập Nhật</button>
    </form>

    <footer>
        <p>&copy; 2026 SmartCare. Tất cả quyền được bảo lưu.</p>
    </footer>

    <script>
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('role');
            localStorage.removeItem('username');
            window.location.href = '/';
        }
    </script>
</body>
</html>
