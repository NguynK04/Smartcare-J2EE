<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đánh Giá và Nhận Xét - SmartCare</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="/" class="brand">🏥 SmartCare</a>
            <div class="nav-right">
                <a href="/" class="btn btn-outline" onclick="logout()">Đăng Xuất</a>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <div class="hero">
        <h1>⭐ Đánh Giá Bác Sĩ</h1>
    </div>

    <!-- Review Form -->
    <form id="reviewForm" class="container" style="max-width: 600px; margin: 2rem auto;">
        <div id="alertContainer"></div>

        <div class="form-group">
            <label for="rating">Đánh Giá (Sao)</label>
            <div style="display: flex; gap: 1rem; font-size: 2rem;">
                <span class="star" data-rating="1">⭐</span>
                <span class="star" data-rating="2">⭐</span>
                <span class="star" data-rating="3">⭐</span>
                <span class="star" data-rating="4">⭐</span>
                <span class="star" data-rating="5">⭐</span>
            </div>
            <input type="hidden" id="rating" name="rating">
        </div>

        <div class="form-group">
            <label for="comment">Nhận Xét</label>
            <textarea id="comment" placeholder="Chia sẻ trải nghiệm khám bệnh..."></textarea>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 1rem;">Gửi Đánh Giá</button>
    </form>

    <footer>
        <p>&copy; 2026 SmartCare. Tất cả quyền được bảo lưu.</p>
    </footer>

    <script>
        // =====================================================
        // LẤY APPOINTMENT ID TỪ URL
        // =====================================================
        function getAppointmentIdFromUrl() {
            const pathParts = window.location.pathname.split('/');
            // URL: /patient/review/{id} -> lấy phần tử cuối cùng
            return pathParts[pathParts.length - 1];
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('role');
            localStorage.removeItem('username');
            window.location.href = '/';
        }

        // =====================================================
        // STAR RATING HANDLER
        // =====================================================
        document.querySelectorAll('.star').forEach(star => {
            star.addEventListener('click', () => {
                const rating = star.dataset.rating;
                document.getElementById('rating').value = rating;
                
                document.querySelectorAll('.star').forEach(s => {
                    if (s.dataset.rating <= rating) {
                        s.style.opacity = '1';
                    } else {
                        s.style.opacity = '0.5';
                    }
                });
            });
        });

        // =====================================================
        // SUBMIT REVIEW FORM
        // =====================================================
        document.getElementById('reviewForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const appointmentId = getAppointmentIdFromUrl();
            const rating = document.getElementById('rating').value;
            const comment = document.getElementById('comment').value;
            const token = localStorage.getItem('token');
            const alertContainer = document.getElementById('alertContainer');

            // Kiểm tra rating
            if (!rating) {
                alertContainer.innerHTML = '<div class="alert alert-danger">Vui lòng chọn số sao để đánh giá!</div>';
                return;
            }

            try {
                const response = await fetch('/api/v1/reviews', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        appointmentId: parseInt(appointmentId),
                        rating: parseInt(rating),
                        comment: comment
                    })
                });

                const data = await response.json();

                if (response.ok && data.code === 201) {
                    alertContainer.innerHTML = '<div class="alert alert-success">Cảm ơn bạn! Đánh giá của bạn đã được gửi thành công.</div>';
                    setTimeout(() => {
                        window.location.href = '/patient/appointments';
                    }, 2000);
                } else {
                    alertContainer.innerHTML = `<div class="alert alert-danger">${data.message || 'Lỗi gửi đánh giá'}</div>`;
                }
            } catch (error) {
                alertContainer.innerHTML = `<div class="alert alert-danger">Lỗi kết nối: ${error.message}</div>`;
            }
        });

        // Kiểm tra auth khi load trang
        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('token');
            if (!token || localStorage.getItem('role') !== 'PATIENT') {
                window.location.href = '/login';
            }
        });
    </script>

    <style>
        .star {
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.2s;
        }
        .star:hover {
            opacity: 1;
        }
    </style>
</body>
</html>
