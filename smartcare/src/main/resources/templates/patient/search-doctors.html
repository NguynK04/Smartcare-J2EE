<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tìm Bác Sĩ - SmartCare</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="/" class="brand">🏥 SmartCare</a>
            <ul class="nav-links">
                <li><a href="/patient/dashboard">Dashboard</a></li>
                <li><a href="/patient/search-doctors">Tìm Bác Sĩ</a></li>
                <li><a href="/patient/appointments">Lịch Khám</a></li>
            </ul>
            <div class="nav-right">
                <a href="/patient/profile">👤 Hồ Sơ</a>
                <a href="/" class="btn btn-outline" onclick="logout()">Đăng Xuất</a>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <div class="hero">
        <h1>🔍 Tìm Bác Sĩ</h1>
        <p>Tìm kiếm bác sĩ theo chuyên khoa hoặc tên</p>
    </div>

    <!-- Search Form -->
    <div class="container" style="margin: 2rem auto;">
        <div class="card">
            <h3>Tìm Kiếm Bác Sĩ</h3>
            <div class="grid" style="grid-template-columns: 1fr 1fr auto; gap: 1rem; align-items: end;">
                <div class="form-group">
                    <label for="specialty">Chuyên Khoa</label>
                    <select id="specialty">
                        <option value="">-- Tất cả chuyên khoa --</option>
                        <option value="1">Khoa Nội</option>
                        <option value="2">Tim Mạch</option>
                        <option value="3">Thần Kinh</option>
                        <option value="4">Nhi Khoa</option>
                        <option value="5">Chỉnh Hình</option>
                        <option value="6">Nha Khoa</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="doctorName">Tên Bác Sĩ</label>
                    <input type="text" id="doctorName" placeholder="Nhập tên bác sĩ...">
                </div>
                <button onclick="searchDoctors()" class="btn btn-primary">Tìm</button>
            </div>
        </div>

        <!-- Results -->
        <div id="doctorsContainer" style="margin-top: 2rem;">
            <!-- Doctors will be loaded here -->
        </div>
    </div>

    <footer>
        <p>&copy; 2026 SmartCare. Tất cả quyền được bảo lưu.</p>
    </footer>

    <script>
        function checkAuth() {
            const token = localStorage.getItem('token');
            const role = localStorage.getItem('role');
            
            if (!token || role !== 'PATIENT') {
                window.location.href = '/login';
            }
        }

        async function searchDoctors() {
            const doctorName = document.getElementById('doctorName').value || '';
            const specialtyId = document.getElementById('specialty').value || '';
            const token = localStorage.getItem('token');
            const container = document.getElementById('doctorsContainer');

            // If both fields are empty, show a message
            if (!doctorName.trim() && !specialtyId) {
                container.innerHTML = '<p style="text-align: center; color: #999;">Vui lòng nhập tên bác sĩ hoặc chọn chuyên khoa để tìm kiếm</p>';
                return;
            }

            try {
                let url = '';
                
                // If specialty is selected, use specialty endpoint
                if (specialtyId) {
                    url = `/api/v1/doctors/by-specialty?specialtyId=${encodeURIComponent(specialtyId)}`;
                } 
                // Otherwise search by name
                else if (doctorName.trim()) {
                    url = `/api/v1/doctors/search?keyword=${encodeURIComponent(doctorName)}`;
                }

                if (!url) {
                    container.innerHTML = '<p style="text-align: center; color: #999;">Vui lòng nhập tên bác sĩ hoặc chọn chuyên khoa để tìm kiếm</p>';
                    return;
                }

                const response = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                if (data.code === 200 && data.data && data.data.length > 0) {
                    let html = '<div class="grid">';
                    
                    data.data.forEach(doctor => {
                        html += `
                            <div class="card">
                                <h4 style="color: var(--primary-color);">👨‍⚕️ ${doctor.fullName}</h4>
                                <p><strong>Chuyên Khoa:</strong> ${doctor.specialtyName}</p>
                                <a href="/patient/book-appointment/${doctor.id}" class="btn btn-primary" style="width: 100%; text-align: center; margin-top: 1rem;">Đặt Lịch</a>
                            </div>
                        `;
                    });

                    html += '</div>';
                    container.innerHTML = html;
                } else {
                    container.innerHTML = '<p style="text-align: center; color: #999;">Không tìm thấy bác sĩ nào</p>';
                }
            } catch (error) {
                container.innerHTML = `<div class="alert alert-danger">Lỗi tìm kiếm: ${error.message}</div>`;
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('role');
            localStorage.removeItem('username');
            window.location.href = '/';
        }

        checkAuth();
        // Don't search automatically on page load - let user select criteria first
    </script>
</body>
</html>
