<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - SmartCare</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="/" class="brand">🏥 SmartCare</a>
            <div class="nav-right">
                <a href="/" class="btn btn-outline">← Quay Lại</a>
            </div>
        </div>
    </nav>

    <!-- Login Form -->
    <form id="loginForm">
        <h2 class="text-center" style="color: var(--primary-color); margin-bottom: 2rem;">Đăng Nhập</h2>

        <div id="alertContainer"></div>

        <div class="form-group">
            <label for="username">Tên Đăng Nhập</label>
            <input type="text" id="username" name="username" placeholder="Nhập tên đăng nhập" required>
        </div>

        <div class="form-group">
            <label for="password">Mật Khẩu</label>
            <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 1rem;">Đăng Nhập</button>

        <div style="text-align: center;">
            <p>Chưa có tài khoản? <a href="/register" style="color: var(--primary-color); text-decoration: none; font-weight: bold;">Đăng Ký Ngay</a></p>
        </div>
    </form>

    <footer>
        <p>&copy; 2026 SmartCare. Tất cả quyền được bảo lưu.</p>
    </footer>

    <script>
        async function handleLogin(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const alertContainer = document.getElementById('alertContainer');

            try {
                const response = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.data && data.data.token) {
                    // Lưu token + thông tin user
                    localStorage.setItem('token', data.data.token);
                    localStorage.setItem('role', data.data.role);
                    localStorage.setItem('username', username);
                    // Lưu userId nếu API trả về (để dùng cho chat)
                    if (data.data.userId) {
                        localStorage.setItem('userId', data.data.userId);
                    }

                    // Chuyển hướng dựa trên vai trò
                    const role = data.data.role.toUpperCase();
                    if (role === 'PATIENT') {
                        window.location.href = '/patient/dashboard';
                    } else if (role === 'DOCTOR') {
                        window.location.href = '/doctor/dashboard';
                    } else if (role === 'ADMIN') {
                        window.location.href = '/admin/dashboard';
                    } else if (role === 'STAFF') {
                        window.location.href = '/admin/customer-service';
                    }
                } else {
                    alertContainer.innerHTML = `<div class="alert alert-danger">${data.message || 'Đăng nhập thất bại'}</div>`;
                }
            } catch (error) {
                alertContainer.innerHTML = `<div class="alert alert-danger">Lỗi kết nối: ${error.message}</div>`;
            }
        }

        document.getElementById('loginForm').addEventListener('submit', handleLogin);
    </script>
</body>
</html>
